  db:
    restart: unless-stopped
    image: postgres:17-alpine
    ports:
      - "5432:5432" # On expose le port pour pouvoir inspecter la base pendant la phase de développement
    environment:
      POSTGRES_PASSWORD: grafikart
      POSTGRES_USER: grafikart
      POSTGRES_DB: grafikart
      POSTGRES_HOST_AUTH_METHOD: trust
      TZ: Europe/Paris
      PGTZ: Europe/Paris
    volumes:
      - ./storage/db:/var/lib/postgresql/data
      - ./storage/dump:/var/dump
  redis:
    restart: unless-stopped
    image: redis:7-alpine
    ports:
      - "6379:6379"
  typesense:
    restart: unless-stopped
    image: typesense/typesense:28.0
    ports:
      - "8108:8108"
    command: '--data-dir /data --api-key=typesensekey --enable-cors'
    volumes:
      - ./storage/typesense:/data

